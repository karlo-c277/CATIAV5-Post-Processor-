<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>apt-gcodev0.8-html</title>
    <!--<link rel="stylesheet" href="style.css">-->
</head>
<body>
    <div class="container">
        <h1>APT-Gcode-v0.8</h1>
        <div class="form-group">
            <label for="costumFilename">Enter file name:</label>
            <input type="file" id="costumFilename" placeholder="beans.aptsource">
        </div>
        <div class="form-group2">
            <label for="demoSelect">Or select a demo file:</label>
            <select id="demoSelect">
                <option value="">-- Choose Demo --</option>
                <option value="DEMO1.txt">DEMO1</option>
                <option value="DEMO2.txt">DEMO2</option>
                <option value="DEMO3.txt">DEMO3</option>
                <option value="DEMO4.txt">DEMO4</option>
                <option value="DEMO5.txt">DEMO5</option>
                <option value="DEMO6.txt">DEMO6</option>
                <option value="DEMO7.txt">DEM07</option>
            </select>
        </div>
        <button id="translateButton">
            APT-Gcode translate
        </button>
        <div class="inputSettings">
            <label for="inputSettings">Choose settings for input file</label>

            <select name="APT code type" id="apt-code-version">
                <option value="">-- Choose APT code type --</option>
                <option value="catiav5_1.0">CATIAV5 APT1.0</option>
            </select>
        </div>
        <div class="outputSettings">
            <label for="outputSettings">Choose output settings</label>
            <select name="Output" id="preset">
                <option value="">-- Select preset output code --</option>
                <option value="costum">Costum</option>
                <option value="WinNC Sinumerik">WinNC Sinumerik</option>
            </select>
            <label>File name (needed for header and file output)</label>
            <input type="text" id="filename" placeholder="CNC_gcode">
            <div class="outputSettings">
                <input type="checkbox" id="downloadOutput">
                Automatically download output file
            </div>
        </div>
        <div id="costumOptions" class="hiddenPanel" style="display: none">
            <h4>Costum settings</h4>
            <div class="costumSettings">
                <label>Costum settings</label>
                <input type="text" id="command-to-iso" placeholder="Enter G-code command to switch to ISO6983 mode">
                <label>Header - some programs check for specific frazes in the header name</label>
                <input type="text" id="output_header" placeholder="%Baked_Beans.MPF%">
            </div>
        </div>
        <div id="costumOutput" class="hiddenPanel" style="display: none">
            <h5>Output settings</h5>
            <div class="costumOutputFile">
                <label>Output file encoding</label>
                <select name="encodingtyp" id="enc_output">
                    <option value="windows-1252">ASCII</option>
                    <option value="utf-8">UTF-8</option>
                    <option value="windows-1252">WINDOWS-1252</option>
                    <option value="iso-8859-1">ISO-8859-1</option>
                    <option value="iso-8859-15">ISO-8859-15</option>
                    <option value="shift_jis">SHIFT_JIS</option>
                    <option value="euc-jp">EUC-JP</option>
                    <option value="iso-2022-jp">ISO-2022-JP</option>
                    <option value="gbk">GBK</option>
                    <option value="gb18030">GB18030</option>
                    <option value="big5">BIG5</option>
                    <option value="euc-kr">EUC-KR</option>
                    <option value="utf-16le">UTF-16LE</option>
                    <option value="utf-16be">UTF-16BE</option>
                </select>
                <label>File extension</label>
                <input type="text" id="extension" placeholder=".extension">
            </div>
        </div>

        <div class="terminal-container">
            <h3>Output:</h3>
            <pre id="terminalOutput">-no output select a file and translate it to generate output</pre>

        </div>
        <div id="errorBox"></div>
    </div>
    <script type="module" src="java_index.js"></script>
    <script type="module" src="startup.js"></script>
</body>
